<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hangman</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 4px;
      margin-bottom: 20px;
      color: #e94560;
    }

    .game {
      display: flex;
      gap: 40px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* --- Gallows --- */
    #gallows {
      background: #16213e;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    #gallows svg {
      display: block;
    }

    .gallows-part { stroke: #c9d1d9; stroke-width: 4; stroke-linecap: round; fill: none; }
    .body-part    { stroke: #e94560; stroke-width: 3; stroke-linecap: round; fill: none; transition: opacity 0.3s; }
    .hidden       { opacity: 0; }

    /* --- Right panel --- */
    .panel {
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 420px;
      width: 100%;
    }

    /* Word display */
    #word-display {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .letter-box {
      width: 38px;
      height: 48px;
      border-bottom: 3px solid #e94560;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: bold;
      letter-spacing: 1px;
      color: #fff;
      transition: color 0.2s;
    }

    /* Used letters */
    .section-title {
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: #8b8fa8;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    #used-letters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .used-chip {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .used-chip.wrong   { background: #e94560; color: #fff; }
    .used-chip.correct { background: #2ea043; color: #fff; }

    /* Keyboard */
    #keyboard {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }

    .key {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 6px;
      background: #0f3460;
      color: #eee;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .key:hover:not(:disabled) { background: #e94560; transform: scale(1.1); }
    .key:disabled { opacity: 0.25; cursor: default; transform: none; }

    /* Status / message */
    #message {
      font-size: 1.3rem;
      font-weight: bold;
      text-align: center;
      min-height: 2rem;
      color: #ffd700;
    }

    /* Hint */
    #hint {
      font-size: 0.85rem;
      color: #8b8fa8;
      text-align: center;
      font-style: italic;
    }

    /* New game button */
    #new-game {
      padding: 10px 28px;
      background: #e94560;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      align-self: center;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }
    #new-game:hover { background: #c73652; transform: scale(1.05); }

    /* Wrong counter */
    #wrong-counter {
      text-align: center;
      font-size: 0.85rem;
      color: #8b8fa8;
    }
    #wrong-counter span { color: #e94560; font-weight: bold; }
  </style>
</head>
<body>

<h1>HANGMAN</h1>

<div class="game">

  <!-- Gallows SVG -->
  <div id="gallows">
    <svg width="200" height="220" viewBox="0 0 200 220">
      <!-- Static structure -->
      <line class="gallows-part" x1="20" y1="210" x2="180" y2="210"/> <!-- base -->
      <line class="gallows-part" x1="60"  y1="210" x2="60"  y2="10"/>  <!-- pole -->
      <line class="gallows-part" x1="60"  y1="10"  x2="130" y2="10"/>  <!-- top beam -->
      <line class="gallows-part" x1="130" y1="10"  x2="130" y2="35"/>  <!-- rope -->

      <!-- Body parts (revealed progressively) -->
      <!-- Head -->
      <circle id="p-head"   class="body-part hidden" cx="130" cy="50" r="16"/>
      <!-- Body -->
      <line   id="p-body"   class="body-part hidden" x1="130" y1="66" x2="130" y2="130"/>
      <!-- Left arm -->
      <line   id="p-larm"   class="body-part hidden" x1="130" y1="80" x2="105" y2="108"/>
      <!-- Right arm -->
      <line   id="p-rarm"   class="body-part hidden" x1="130" y1="80" x2="155" y2="108"/>
      <!-- Left leg -->
      <line   id="p-lleg"   class="body-part hidden" x1="130" y1="130" x2="105" y2="165"/>
      <!-- Right leg -->
      <line   id="p-rleg"   class="body-part hidden" x1="130" y1="130" x2="155" y2="165"/>
    </svg>
  </div>

  <!-- Right panel -->
  <div class="panel">
    <div id="message"></div>

    <div>
      <div class="section-title">Word</div>
      <div id="word-display"></div>
    </div>

    <div id="hint"></div>

    <div id="wrong-counter">Wrong guesses: <span id="wrong-count">0</span> / 6</div>

    <div>
      <div class="section-title">Used Letters</div>
      <div id="used-letters"></div>
    </div>

    <div>
      <div class="section-title">Keyboard</div>
      <div id="keyboard"></div>
    </div>

    <button id="new-game">New Game</button>
  </div>
</div>

<script>
  const WORDS = [
    { word: "javascript", hint: "A popular programming language" },
    { word: "elephant",   hint: "Largest land animal" },
    { word: "pyramid",    hint: "Ancient Egyptian structure" },
    { word: "chocolate",  hint: "Sweet treat from cacao" },
    { word: "keyboard",   hint: "You type with this" },
    { word: "volcano",    hint: "Mountain that erupts" },
    { word: "dolphin",    hint: "Intelligent marine mammal" },
    { word: "compass",    hint: "Navigation tool" },
    { word: "hurricane",  hint: "Powerful tropical storm" },
    { word: "telescope",  hint: "Used to see distant stars" },
    { word: "labyrinth",  hint: "A maze-like structure" },
    { word: "avalanche",  hint: "Snow rushing down a mountain" },
    { word: "firefox",    hint: "A popular web browser" },
    { word: "harmony",    hint: "Pleasing combination of sounds" },
    { word: "galaxy",     hint: "A system of millions of stars" },
    { word: "skeleton",   hint: "Bones of the body" },
    { word: "phantom",    hint: "A ghost or apparition" },
    { word: "cactus",     hint: "Desert plant with spines" },
    { word: "blizzard",   hint: "A severe snowstorm" },
    { word: "sphinx",     hint: "Mythical creature with lion body" },
  ];

  const BODY_PARTS = ['p-head','p-body','p-larm','p-rarm','p-lleg','p-rleg'];

  let word, hint, guessed, wrong, gameOver;

  function pickWord() {
    const item = WORDS[Math.floor(Math.random() * WORDS.length)];
    word     = item.word.toLowerCase();
    hint     = item.hint;
    guessed  = new Set();
    wrong    = 0;
    gameOver = false;
  }

  function buildKeyboard() {
    const kb = document.getElementById('keyboard');
    kb.innerHTML = '';
    for (let c = 65; c <= 90; c++) {
      const letter = String.fromCharCode(c).toLowerCase();
      const btn = document.createElement('button');
      btn.textContent = letter.toUpperCase();
      btn.className = 'key';
      btn.dataset.letter = letter;
      btn.addEventListener('click', () => guess(letter));
      kb.appendChild(btn);
    }
  }

  function renderWord() {
    const display = document.getElementById('word-display');
    display.innerHTML = '';
    for (const ch of word) {
      const box = document.createElement('div');
      box.className = 'letter-box';
      box.textContent = guessed.has(ch) ? ch.toUpperCase() : '';
      display.appendChild(box);
    }
  }

  function renderUsed() {
    const area = document.getElementById('used-letters');
    area.innerHTML = '';
    const sorted = [...guessed].sort();
    for (const ch of sorted) {
      const chip = document.createElement('span');
      chip.className = 'used-chip ' + (word.includes(ch) ? 'correct' : 'wrong');
      chip.textContent = ch.toUpperCase();
      area.appendChild(chip);
    }
  }

  function renderGallows() {
    BODY_PARTS.forEach((id, i) => {
      document.getElementById(id).classList.toggle('hidden', i >= wrong);
    });
  }

  function renderWrongCount() {
    document.getElementById('wrong-count').textContent = wrong;
  }

  function checkWin() {
    return [...word].every(ch => guessed.has(ch));
  }

  function setMessage(msg) {
    document.getElementById('message').textContent = msg;
  }

  function disableKey(letter) {
    const btn = document.querySelector(`.key[data-letter="${letter}"]`);
    if (btn) btn.disabled = true;
  }

  function disableAll() {
    document.querySelectorAll('.key').forEach(b => b.disabled = true);
  }

  function guess(letter) {
    if (gameOver || guessed.has(letter)) return;
    guessed.add(letter);

    if (!word.includes(letter)) wrong++;

    disableKey(letter);
    renderWord();
    renderUsed();
    renderGallows();
    renderWrongCount();

    if (wrong >= 6) {
      gameOver = true;
      disableAll();
      // Reveal the word
      document.querySelectorAll('.letter-box').forEach((box, i) => {
        box.textContent = word[i].toUpperCase();
        if (!guessed.has(word[i])) box.style.color = '#e94560';
      });
      setMessage('Game over! The word was: ' + word.toUpperCase());
    } else if (checkWin()) {
      gameOver = true;
      disableAll();
      setMessage('You won!');
    } else {
      setMessage('');
    }
  }

  function startGame() {
    pickWord();
    buildKeyboard();
    renderWord();
    renderUsed();
    renderGallows();
    renderWrongCount();
    setMessage('');
    document.getElementById('hint').textContent = 'Hint: ' + hint;
  }

  document.getElementById('new-game').addEventListener('click', startGame);

  // Physical keyboard support
  document.addEventListener('keydown', e => {
    if (e.key.length === 1 && /[a-zA-Z]/.test(e.key)) {
      guess(e.key.toLowerCase());
    }
  });

  startGame();
</script>
</body>
</html>
