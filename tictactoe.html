<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 4px;
      margin-bottom: 20px;
      color: #2ea043;
    }

    .nav {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .nav-link {
      padding: 8px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #8b8fa8;
      background: #16213e;
      transition: background 0.15s, color 0.15s, transform 0.1s;
    }

    .nav-link:hover {
      background: #0f3460;
      color: #fff;
      transform: translateY(-1px);
    }

    .nav-link.active {
      background: #2ea043;
      color: #fff;
    }

    .game-container {
      background: #16213e;
      border-radius: 16px;
      padding: 24px 28px 28px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 90px);
      grid-template-rows: repeat(3, 90px);
      gap: 8px;
    }

    .cell {
      width: 90px;
      height: 90px;
      border-radius: 12px;
      background: #0f3460;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      user-select: none;
    }

    .cell:hover {
      background: #1b4a89;
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.35);
    }

    .cell.filled {
      cursor: default;
      opacity: 0.95;
      box-shadow: none;
      transform: none;
    }

    .cell.x {
      color: #e94560;
    }

    .cell.o {
      color: #2ea043;
    }

    .cell.win {
      background: #ffd700;
      color: #16213e;
    }

    .status {
      font-size: 1.1rem;
      font-weight: bold;
      text-align: center;
      min-height: 1.6rem;
      color: #ffd700;
    }

    .subtle {
      font-size: 0.85rem;
      color: #8b8fa8;
      text-align: center;
    }

    #new-game {
      padding: 10px 28px;
      background: #2ea043;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    #new-game:hover {
      background: #24883a;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="hangman.html" class="nav-link">Hangman</a>
  <a href="tictactoe.html" class="nav-link active">Tic Tac Toe</a>
</nav>

<h1>TIC TAC TOE</h1>

<div class="game-container">
  <div class="status" id="status"></div>
  <div class="board" id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>
  <button id="new-game">New Game</button>
  <div class="subtle">Two-player game: take turns as X and O. First to get three in a row wins.</div>
</div>

<script>
  const board = Array(9).fill(null);
  let currentPlayer = 'X';
  let gameOver = false;

  const winningCombos = [
    [0, 1, 2],
    [3, 4, 5],
    [6, 7, 8],
    [0, 3, 6],
    [1, 4, 7],
    [2, 5, 8],
    [0, 4, 8],
    [2, 4, 6]
  ];

  const statusEl = document.getElementById('status');
  const cells = Array.from(document.querySelectorAll('.cell'));

  function setStatus(message) {
    statusEl.textContent = message;
  }

  function renderBoard() {
    cells.forEach((cell, index) => {
      const value = board[index];
      cell.textContent = value || '';
      cell.classList.toggle('filled', !!value);
      cell.classList.toggle('x', value === 'X');
      cell.classList.toggle('o', value === 'O');
      cell.classList.remove('win');
    });
  }

  function checkWinner() {
    for (const [a, b, c] of winningCombos) {
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return { player: board[a], combo: [a, b, c] };
      }
    }
    if (board.every(cell => cell)) {
      return { player: null, combo: null }; // draw
    }
    return null;
  }

  function handleCellClick(index) {
    if (gameOver || board[index]) return;
    board[index] = currentPlayer;
    renderBoard();

    const result = checkWinner();
    if (result) {
      gameOver = true;
      if (result.player) {
        result.combo.forEach(i => cells[i].classList.add('win'));
        setStatus('Player ' + result.player + ' wins!');
      } else {
        setStatus("It's a draw!");
      }
      return;
    }

    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    setStatus("Player " + currentPlayer + "'s turn");
  }

  function resetGame() {
    for (let i = 0; i < board.length; i++) {
      board[i] = null;
    }
    currentPlayer = 'X';
    gameOver = false;
    renderBoard();
    setStatus("Player X's turn");
  }

  cells.forEach(cell => {
    const index = Number(cell.dataset.index);
    cell.addEventListener('click', () => handleCellClick(index));
  });

  document.getElementById('new-game').addEventListener('click', resetGame);

  // Start initial game
  resetGame();
</script>

</body>
</html>
